<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SafeLimit∞ Zenith</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='z' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2300ff88'/><stop offset='100%' stop-color='%230066ff'/></linearGradient></defs><circle cx='50' cy='50' r='48' fill='%23050505' stroke='url(%23z)' stroke-width='2'/><text x='50%' y='48%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='35' fill='white'>SL</text><text x='50%' y='72%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='22' fill='url(%23z)'>∞</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='z' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2300ff88'/><stop offset='100%' stop-color='%230066ff'/></linearGradient></defs><circle cx='50' cy='50' r='48' fill='%23050505' stroke='url(%23z)' stroke-width='2'/><text x='50%' y='48%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='35' fill='white'>SL</text><text x='50%' y='72%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='22' fill='url(%23z)'>∞</text></svg>">

    <style>
        :root { --bg: #000; --panel: #0a0a0a; --accent: #00ff88; --sec: #0066ff; --border: #151515; }
        body { background: var(--bg); color: #fff; font-family: 'SF Pro Display', -apple-system, sans-serif; margin: 0; padding: 20px; letter-spacing: -0.02em; }
        .container { max-width: 440px; margin: auto; }
        
        /* Dashboard */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .zenith-title { font-size: 26px; font-weight: 900; background: linear-gradient(to bottom right, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-card { background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%); border: 1px solid var(--border); border-radius: 35px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .total-val { font-size: 50px; font-weight: 900; color: #fff; margin: 10px 0; font-variant-numeric: tabular-nums; }
        
        .track { background: #111; height: 12px; border-radius: 50px; margin: 25px 0; border: 1px solid #1a1a1a; overflow: hidden; }
        .bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--sec)); box-shadow: 0 0 20px rgba(0,255,136,0.3); transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Stats Blocks */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .block { background: var(--panel); border: 1px solid var(--border); border-radius: 25px; padding: 18px; }
        .label { font-size: 9px; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .val { font-size: 19px; font-weight: 800; }

        /* Input System */
        .input-panel { background: #080808; border: 1px solid var(--border); border-radius: 30px; padding: 20px; }
        .type-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #1a1a1a; font-size: 11px; font-weight: 800; color: #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .type-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.05); }

        input { background: #000; border: 1px solid #1a1a1a; color: #fff; padding: 16px; border-radius: 15px; width: 100%; box-sizing: border-box; font-size: 15px; margin-bottom: 12px; outline: none; }
        .btn-zenith { background: #fff; color: #000; border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; }

        /* History */
        .item { display: flex; justify-content: space-between; align-items: center; padding: 18px 5px; border-bottom: 1px solid #111; }
        .cat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .d-dot { background: var(--sec); box-shadow: 0 0 10px var(--sec); }
        .g-dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="zenith-title">SafeLimit<span style="color:var(--accent)">∞</span></div>
            <div style="font-size:9px; font-weight:900; color:#222; border:1px solid #222; padding:3px 8px; border-radius:20px;">ZENITH V7</div>
        </header>

        <div class="main-card">
            <div class="label">Balance Consolidado 2026</div>
            <div id="anualOut" class="total-val">S/ 0.00</div>
            <div class="track"><div id="bar" class="bar"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:900;">
                <span id="pctOut" style="color:var(--accent)">0.0%</span>
                <span style="color:#333">TOPE LEGAL: S/ 48,125</span>
            </div>
        </div>

        <div class="stats-row">
            <div class="block">
                <div class="label">Semana Actual</div>
                <div id="semOut" class="val" style="color:var(--accent)">S/ 0</div>
            </div>
            <div class="block">
                <div class="label">Remanente Seguro</div>
                <div id="restaOut" class="val">S/ 0</div>
            </div>
        </div>

        <div class="input-panel">
            <div class="type-select">
                <div class="type-btn active" id="btnDig" onclick="setT('Digitación')">DIGITACIÓN</div>
                <div class="type-btn" id="btnDis" onclick="setT('Diseño')">DISEÑO LOGO</div>
            </div>
            <input type="text" id="concepto" placeholder="Nombre del Cliente o Detalle">
            <input type="number" id="monto" placeholder="S/ Importe Bruto" inputmode="decimal">
            <button class="btn-zenith" onclick="save()">Confirmar Registro</button>
        </div>

        <div id="historial" style="margin-top:30px;"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('safelimit_zenith_v7')) || [];
        const LIMIT = 48125;
        let cT = 'Digitación';

        function setT(t) {
            cT = t;
            document.getElementById('btnDig').className = t === 'Digitación' ? 'type-btn active' : 'type-btn';
            document.getElementById('btnDis').className = t === 'Diseño' ? 'type-btn active' : 'type-btn';
        }

        function getW(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(),0,1)))/86400000)+1)/7);
        }

        function refresh() {
            const h = document.getElementById('historial'); h.innerHTML = '<div class="label">Historial de Operaciones</div>';
            let tA = 0, tS = 0;
            const wN = getW(new Date());

            db.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
            db.forEach((item, i) => {
                const m = parseFloat(item.monto);
                tA += m;
                if(getW(new Date(item.fecha + 'T12:00:00')) === wN) tS += m;

                const dot = item.tipo === 'Diseño' ? 'd-dot' : 'g-dot';
                h.innerHTML += `<div class="item">
                    <div>
                        <div style="font-size:14px; font-weight:700;"><span class="cat-dot ${dot}"></span>${item.concepto || 'Sin detalle'}</div>
                        <div style="font-size:10px; color:#222; margin-top:4px;">${item.fecha} — ${item.tipo.toUpperCase()}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:900; font-size:15px;">S/ ${m.toFixed(2)}</div>
                        <div onclick="remove(${i})" style="color:#111; font-size:14px; cursor:pointer; margin-top:5px;">Eliminar</div>
                    </div>
                </div>`;
            });

            const p = Math.min((tA / LIMIT) * 100, 100);
            document.getElementById('anualOut').innerText = `S/ ${tA.toLocaleString('en-US', {minimumFractionDigits:2})}`;
            document.getElementById('semOut').innerText = `S/ ${tS.toFixed(2)}`;
            document.getElementById('restaOut').innerText = `S/ ${(LIMIT - tA).toLocaleString('en-US')}`;
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('pctOut').innerText = p.toFixed(1) + '%';
            
            const color = p > 85 ? '#ff3b30' : (p > 50 ? '#ffcc00' : '#00ff88');
            document.querySelector(':root').style.setProperty('--accent', color);
        }

        function save() {
            const c = document.getElementById('concepto').value, m = document.getElementById('monto').value;
            if(!m) return;
            db.push({fecha: new Date().toISOString().split('T')[0], tipo: cT, concepto: c, monto: m});
            localStorage.setItem('safelimit_zenith_v7', JSON.stringify(db));
            refresh();
            document.getElementById('concepto').value = ''; document.getElementById('monto').value = '';
        }

        function remove(id) { if(confirm("¿Borrar?")) { db.splice(id, 1); localStorage.setItem('safelimit_zenith_v7', refresh()); refresh(); } }
        refresh();
    </script>
</body>
</html>
